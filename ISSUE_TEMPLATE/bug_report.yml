name: 🐛 Bug Report
description: Report something that isn't working correctly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

        ⚠️ **Do not report security vulnerabilities here.** Use private reporting instead — see our [security policy](https://github.com/EpixZone/.github/blob/main/SECURITY.md).
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Tell us how to reproduce the behavior.
      placeholder: |
        1. Start the node with '...'
        2. Run '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release version, or `git rev-parse HEAD` if built from source.
      placeholder: v1.0.0 or abc1234
    validations:
      required: false
  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS and architecture.
      placeholder: Ubuntu 24.04 x86_64, Windows 11, macOS 15 (arm64), Android 15…
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any relevant log output. This will be automatically formatted as code.
      render: shell
    validations:
      required: false
